[package]
name = "mailtrap-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
mime = { version = "0.3.17"}
url = "2.5.4"
serde = { version = "1.0.219", features = ["derive"] }
validator = "0.20.0"
base64 = "0.22.1"
serde_json = "1.0.140"
serde_with = "3"
reqwest = "0.12.15"

[dev-dependencies]
claims = "0.8.0"
fake = "4.2.0"
tokio = { version = "1.44.1", features = ["macros", "rt-multi-thread"] }
uuid = { version = "1.16.0", features = ["v4"] }
wiremock = "0.6.3"
